aid: npm
url: https://raw.githubusercontent.com/api-evangelist/npm/refs/heads/main/apis.yml
apis:
  - aid: npm:registry-api
    name: npm Registry API
    tags:
      - Packages
      - JavaScript
      - Registry
      - Package Management
      - Node.js
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://registry.npmjs.org
    humanURL: https://github.com/npm/registry/blob/main/docs/REGISTRY-API.md
    properties:
      - url: https://github.com/npm/registry/blob/main/docs/REGISTRY-API.md
        type: Documentation
      - type: OpenAPI
        url: openapi/npm-registry-api-openapi.yml
    description: >-
      The npm Registry API provides programmatic access to the npm package
      registry, the largest software registry in the world hosting over two
      million JavaScript packages. Developers can query package metadata,
      download tarballs, search for packages, and retrieve version-specific
      information. The API follows CouchDB-based conventions and serves
      package manifests in JSON format, enabling tools and services to
      integrate with the npm ecosystem for dependency resolution, package
      discovery, and automated workflows.
  - aid: npm:public-api
    name: npm Public API
    tags:
      - Packages
      - Tokens
      - Authentication
      - Security
      - OIDC
      - Access Control
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://registry.npmjs.org
    humanURL: https://api-docs.npmjs.com/
    properties:
      - url: https://api-docs.npmjs.com/
        type: Documentation
      - type: OpenAPI
        url: openapi/npm-public-api-openapi.yml
    description: >-
      The npm Public API provides authenticated endpoints for managing npm
      access tokens, configuring trusted publishers, and exchanging OIDC
      tokens for short-lived registry access. It supports creating, listing,
      and deleting npm access tokens with customizable permissions, scope
      restrictions, expiration settings, and CIDR IP range limitations. The
      API also enables CI/CD providers like GitHub Actions, GitLab CI, and
      CircleCI to publish packages securely through OIDC token exchange
      without requiring long-lived npm tokens.
  - aid: npm:hooks-api
    name: npm Hooks API
    tags:
      - Webhooks
      - Notifications
      - Events
      - Automation
      - Packages
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://registry.npmjs.org
    humanURL: https://blog.npmjs.org/post/145260155635/introducing-hooks-get-notifications-of-npm
    properties:
      - url: https://blog.npmjs.org/post/145260155635/introducing-hooks-get-notifications-of-npm
        type: Documentation
      - type: OpenAPI
        url: openapi/npm-hooks-api-openapi.yml
      - type: AsyncAPI
        url: asyncapi/npm-hooks-asyncapi.yml
    description: >-
      The npm Hooks API allows developers to subscribe to notifications about
      changes in the npm registry. Hooks send HTTP POST payloads to a
      configured URI whenever a package is changed, enabling developers to
      build integrations that respond to registry events in real time. Users
      can add hooks to follow specific packages, track all activity of given
      npm users, or monitor all packages within an organization or user
      scope. The API provides endpoints for creating, listing, updating, and
      deleting hook subscriptions.
  - aid: npm:cli
    name: npm CLI
    tags:
      - Command Line
      - Package Management
      - JavaScript
      - Node.js
      - Developer Tools
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://docs.npmjs.com/cli
    properties:
      - url: https://docs.npmjs.com/cli
        type: Documentation
      - url: https://github.com/npm/cli
        type: Source Code
    description: >-
      The npm CLI is the official command-line interface for the npm package
      manager, providing developers with tools to install, publish, and
      manage JavaScript packages and their dependencies. It supports package
      publishing with provenance attestation via Sigstore, workspace
      management for monorepos, script execution, semantic versioning,
      and comprehensive dependency tree management. The CLI is bundled with
      Node.js and serves as the primary developer interface for interacting
      with the npm registry.
  - aid: npm:provenance
    name: npm Provenance
    tags:
      - Security
      - Supply Chain
      - Verification
      - Sigstore
      - Transparency
      - CI/CD
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://docs.npmjs.com/generating-provenance-statements
    properties:
      - url: https://docs.npmjs.com/generating-provenance-statements
        type: Documentation
      - url: https://github.blog/security/supply-chain-security/introducing-npm-package-provenance/
        type: Documentation
    description: >-
      npm Provenance provides supply chain security for JavaScript packages
      by establishing a verifiable link between a published package and its
      source code repository and build environment. When a package is
      published with provenance, it is signed using Sigstore public good
      servers and the attestation is logged in a public transparency ledger.
      This allows developers to verify where and how a package was built
      before downloading it, helping to protect against supply chain attacks
      and ensuring the integrity of the npm ecosystem.
common:
  - type: JSON-LD
    url: json-ld/npm-context.jsonld
  - type: JSONSchema
    url: json-schema/npm-package-schema.json
  - type: JSONSchema
    url: json-schema/npm-hook-event-schema.json
